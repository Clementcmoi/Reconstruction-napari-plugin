name: napari-reco-plugin
display_name: Reconstruction Plugin
schema_version: 0.2.0
visibility: public
contributions:
  commands:
    - id: napari-reco-plugin.reconstruction
      python_name: reco_plugin._widget:ReconstructionWidget
      title: Reconstruction

    - id: napari-reco-plugin.multi_paganin
      python_name: reco_plugin._widget:MultiPaganinWidget
      title: Multi Paganin

    - id: napari-reco-plugin.get_reader
      python_name: reco_plugin._reader:napari_get_reader
      title: Read NXS Files

    - id: napari-reco-plugin.tif_writer
      python_name: reco_plugin._writer:write_tiff
      title: Write TIF Files

    - id: napari-reco-plugin.raw_writer
      python_name: reco_plugin._writer:write_raw
      title: Write Raw Files

  widgets:
    - command: napari-reco-plugin.reconstruction
      display_name: Reconstruction

    - command: napari-reco-plugin.multi_paganin
      display_name: Multi Paganin

  readers:
    - command: napari-reco-plugin.get_reader
      filename_patterns: ["*.nxs", "*.tdf"]
      accepts_directories: false

  writers:
    - command: napari-reco-plugin.tif_writer
      layer_types: ["image"]
      filename_extensions: [".tif"]

    - command: napari-reco-plugin.raw_writer
      layer_types: ["image"]
      filename_extensions: [".raw"]
